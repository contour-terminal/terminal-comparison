- id: dec_page_memory
  name: DEC page memory (more than one page)
  category: window
  sequence: CSI Ps U (NP) / CSI Ps V (PP) / CSI Ps SP P (PPA)
  spec: https://vt100.net/docs/vt510-rm/chapter4.html
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: 'no'
    wezterm: 'no'
    gnome-terminal: 'no'
    konsole: 'no'
    windows-terminal: 'yes'
    mintty: 'no'
    iterm2: 'no'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/primitives.h:454 MaxPageCount = 16 with the last index reserved for the alternate
      screen (AlternateScreenPageIndex); measured, 15 DEC-addressable pages reachable and confirmed by
      DECXCPR
    kitty: no page model in kitty/vt-parser.c; worse than unsupported -- dispatch_csi() checks only for
      a '#' intermediate on 'P', so `CSI Ps SP P` (PPA) falls through to the plain DCH branch and deletes
      characters (vt-parser.c:1231-1236)
    ghostty: measured by harness/vt_probe.py on this machine
    foot: measured by harness/vt_probe.py on this machine
    wezterm: measured by harness/vt_probe.py on this machine
    gnome-terminal: vteseq.cc defines Terminal::NP/PP/PPA/PPB/PPR as empty bodies, commented "Since VTE
      only has one page, this is ignored" -- recognised, deliberately no-op
    konsole: measured by harness/vt_probe.py on this machine
    alacritty: measured by harness/vt_probe.py on this machine
    windows-terminal: src/terminal/adapter/PageManager.hpp:66 MAX_PAGES = 6 with an array of six independent
      TextBuffers; PageManager.cpp:152-225 MoveTo swaps row content and carries cursor position and attributes
      across; paging is disabled on the alt buffer (PageManager.cpp:122-125), so this is not scrollback
      relabelled as pages
    mintty: termout.c's space-intermediate cases cover only q,k,S,A,@,t,u,Z -- no P/Q/R -- and its DECCRA
      handler explicitly skips the source and destination page arguments
    xterm: ctlseqs.txt:804-808 states outright that xterm supports a single page and ignores DECPCCM/DECVCCM;
      VTPrsTbl.c:1877-1879 maps PPA/PPR/PPB to CASE_GROUND_STATE, so the sequences are parsed and discarded
    iterm2: no NP/PP/PPA/PPR/PPB token in VT100Terminal.m; the only page-named matches are an unrelated
      key capability and tmux comments
  notes: 'Contour and Windows Terminal are the only two here with a real page model. Windows Terminal''s
    is capped at six pages and resizes background pages without reflowing them, but they are genuinely
    distinct addressable buffers, and paging is bypassed on the alt buffer, which rules out scrollback
    relabelled as pages. xterm recognises the page sequences and discards them, which is why it reports
    a page number while having a single page. kitty is the one to be careful with: `CSI Ps SP P` is not
    rejected but misdispatched as delete-character.'
- id: decxcpr
  name: DECXCPR (extended cursor position report)
  category: window
  sequence: CSI ? 6 n  ->  CSI ? Pr ; Pc ; Pp R
  spec: https://vt100.net/docs/vt510-rm/DECXCPR.html
  support:
    contour: 'yes'
    kitty: partial
    ghostty: 'no'
    foot: 'no'
    wezterm: 'no'
    gnome-terminal: 'yes'
    konsole: 'no'
    windows-terminal: 'yes'
    mintty: partial
    iterm2: 'yes'
    xterm: 'yes'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: 'measured by harness/vt_probe.py on this machine: replies with the page parameter'
    kitty: kitty/screen.c:2932 echoes the '?' prefix but formats only "%u;%uR" -- the private form is
      recognised, the reply carries no page parameter
    ghostty: src/terminal/device_status.zig:96-100 registers cursor_position with question=false, so `CSI
      ? 6 n` matches nothing and no reply is sent at all
    foot: csi.c:1571-1595 handles only param 996 under the '?' private form; `CSI ? 6 n` falls through
      silently with no reply
    wezterm: measured by harness/vt_probe.py on this machine
    konsole: measured by harness/vt_probe.py on this machine
    alacritty: vte src/ansi.rs has only ('n', []) among the 'n' arms -- no ('n', [b'?']) -- so `CSI ?
      6 n` reaches the unhandled arm and is dropped without a reply
    gnome-terminal: vteseq.cc:6552-6596 replies with the page hardcoded to 1, commented "Always report
      page 1 here (per XTERM source code)"
    xterm: charproc.c:4589-4633 answers with a page field, but the value is the literal 1 and the field
      is gated on vtXX_level >= 4; ctlseqs.txt:1425-1428 confirms it "assumes the default page". Correct
      for a terminal with one page
    windows-terminal: src/terminal/adapter/adaptDispatch.cpp:1574-1575 reports the live _pages.ActivePage().Number()
      as the third parameter, not a constant
    mintty: 'src/termout.c:3665-3670 handles CPAIR(''?'',''n'') case 6 and replies "\e[?%d;%dR" -- two
      fields. The inline comment reads ''VT420: third parameter "page"...'' and the page is never emitted,
      so the private form is answered without it'
    iterm2: VT100Terminal.m:1269-1274 gates the report on vt330OrLater (_vtLevel >= iTermEmulationLevel300);
      the page field is emitted as a constant 1, as xterm and VTE also do
  notes: Three distinct behaviours hide behind one row. Contour and Windows Terminal answer with a live
    page number. xterm, GNOME Terminal and iTerm2 answer with the page field present but fixed at 1, which
    is correct for a terminal that has one page. kitty and mintty answer the private form without the
    field at all, recorded as partial. Ghostty, foot and Alacritty do not implement the private form and
    answer nothing -- a rejection rather than a short reply, so an application polling with `CSI ? 6 n`
    waits rather than reading a degraded answer.
