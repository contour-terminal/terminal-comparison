    gnome-terminal: 'no'
    konsole: 'no'
    windows-terminal: 'no'
    mintty: 'no'
    iterm2: 'no'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/TextSizing.h implements the full field set (s=scale, w=width, n/d=fractional
      scale, v/h=alignment), not just vertical scale; Screen.h:245 lays out the request; CellFlags.h/LineSoA.h/CellProxy.h
      carry the per-cell scale
    kitty: kitty/parse-multicell-command.h, kitty/screen.c, kitty/line.c implement multicell/text-sizing
      directly; docs/text-sizing-protocol.rst is the spec source
    ghostty: src/terminal/osc/parsers/kitty_text_sizing.zig is a dedicated parser for OSC 66
    foot: foot/osc.c:1508-1509 dispatches 'case 66' to kitty_text_size(), but osc.c:1201 explicitly comments
      'we don't support any other parameters of the text-sizing protocol' -- a narrower subset
    wezterm: no match for OSC 66 / text-sizing / kitty_text_size anywhere in the wezterm source tree
    gnome-terminal: GitHub code search over GNOME/vte for 'OSC 66'/'text_sizing'/'multicell' returns no
      real hits (the one 'multicell' hits are about ordinary CJK double-width fragments, unrelated to
      the protocol)
    konsole: no reference to the text-sizing protocol or OSC 66 anywhere in konsole/src
    windows-terminal: no OSC 66 / text-sizing handler found in the OutputStateMachineEngine / adaptDispatch
      sources
    mintty: src/termout.c's OSC dispatch table only advertises Sixel, hyperlinks (OSC 8) and file/image
      support in its DA-like feature string; no OSC 66 handling found
    iterm2: GitHub code search over gnachman/iTerm2 for 'OSC 66' returns zero hits
    xterm: no match for OSC 66 / text-sizing in xterm-406 source or ctlseqs.txt
    alacritty: alacritty/vte src/ansi.rs has no OSC 66 / multicell / text-sizing handling
  notes: This is a 2024/2025-era kitty-originated protocol; outside kitty, only ghostty and Contour implement
    it fully, and foot implements a deliberately reduced subset.
- id: decdwl_decdhl
  name: DECDWL / DECDHL (double-width / double-height lines)
  category: unicode
  sequence: 'ESC # 6 (DECDWL), ESC # 3 / ESC # 4 (DECDHL top/bottom)'
  spec: https://vt100.net/docs/vt510-rm/DECDHL.html
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: 'no'
    wezterm: 'yes'
    gnome-terminal: 'no'
    konsole: 'yes'
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: 'yes'
    xterm: 'yes'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/Functions.h:619-621 registers DECDHL_Bottom, DECDHL_Top, DECDWL as ESC sequences
    kitty: 'kitty/vt-parser.c:334 (esc_dispatch''s ''#'' case) only handles ch==''8'' (DECALN); anything
      else, including ''3''/''4''/''6'', falls to ''REPORT_ERROR("Unhandled Esc # code...")'' -- confirmed
      unimplemented'
    ghostty: src/terminal/stream.zig's ESC-with-'#'-intermediate handling (~line 2486) only implements
      '8' (DECALN); everything else hits logUnsupportedOnce('unimplemented ESC action')
    foot: foot/vt.c:573-586, the private='#' case in action_esc_dispatch, only has a 'case 8' (DECALN)
      branch -- no case for '3','4','6'
    wezterm: wezterm-escape-parser/src/esc.rs:90-97 defines DecDoubleHeightTopHalfLine/BottomHalfLine/DecDoubleWidthLine;
      wezterm-surface/src/lib.rs:433-435 wires them to real line.set_double_height_top/bottom/set_double_width
      calls
    gnome-terminal: GNOME/vte src/vteseq.cc has Terminal::DECDHL_BH/DECDHL_TH/DECDWL handlers, but each
      body is empty with the comment 'Probably not worth implementing' (src/parser-seq.py also flags them
      Flags.NOP) -- syntactically recognized, behaviorally a no-op
    konsole: src/Vt102Emulation.cpp:2021-2036 -- token_esc_de('3')/('4')/('5')/('6') implement double-height
      top/bottom, single-width/height reset, and double-width, respectively
    windows-terminal: src/buffer/out/textBuffer.cpp:2441-2442 maps LineRendition::DoubleHeightTop/Bottom
      to '\x1b#3'/'\x1b#4'; src/host/ut_host/ScreenBufferTests.cpp:8124-8126 has dedicated DECDWL/DECDHL
      tests
    mintty: src/termout.c:2121-2134 implements CPAIR('#','3')/('#','4')/('#','6') for DECDHL top/bottom
      and DECDWL
    iterm2: sources/VT100/VT100Terminal.m and VT100Screen.m implement DECDHL (35 source hits across the
      tree, including dedicated tests in ModernTests/iTermLineAttributeTests.swift)
    xterm: xterm-406/doublechr.c:108-138 (xterm_DECDHL, xterm_DECDWL) plus VTPrsTbl.c dispatch table entries
      CASE_DECDHL/CASE_DECDWL
    alacritty: alacritty/vte src/ansi.rs:1814 -- the only '#'-intermediate ESC handled is (b'8',[b'#'])
      => self.handler.decaln(); no case for '3'/'4'/'6' exists anywhere in the crate
  notes: 'A genuine three-way split: xterm/Windows Terminal/mintty/Konsole/iTerm2 keep this VT100-era
    feature; every GPU-accelerated 2020s terminal in this set (kitty, ghostty, foot, alacritty) has dropped
    it outright; wezterm and Contour are the exceptions that still render it. VTE recognizes the syntax
    (so it won''t desync the parser) but the handlers are intentionally empty.'
