      implementation found
    contour: src/vtbackend/primitives.h:1311 declares {MouseProtocolHighlightTracking, 1001} so DECRQM
      reports it supported, but InputGenerator.cpp:1298-1299 returns false with a TODO, so no report is
      ever emitted
    gnome-terminal: src/modes.py:1248 recognised and mapped to eHILITE_TRACKING, but vte.cc has no special
      handling, so it behaves as plain click reporting
    foot: 'csi.c:402-405 logs ''unimplemented: highlight mouse tracking'''
    ghostty: not declared in modes.zig (jumps 1000 to 1002)
    kitty: not declared (jumps MOUSE_BUTTON_TRACKING to MOUSE_MOTION_TRACKING)
    konsole: 'Vt102Emulation.cpp:2277 ''TODO: Implementation of mouse mode 1001''; ignored'
    wezterm: mod.rs:1770-1774 accepts HighlightMouseTracking with an empty handler
    windows-terminal: no DECPrivateMode(1001) entry
    mintty: no 1001 in termout.c
    iterm2: VT100Terminal.m:842-843 explicit TODO, not implemented
    alacritty: not in NamedPrivateMode
  notes: The interesting row. xterm is the only full implementation. Contour and VTE both answer DECRQM
    affirmatively while emitting nothing, so a mode query is not sufficient to detect it -- which is why
    the measured table reports Contour as supporting a mode it does not honour.
