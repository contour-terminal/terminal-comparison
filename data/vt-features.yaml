    gnome-terminal: https://gitlab.gnome.org/GNOME/vte/-/issues/2601 (open feature request, MR!14 unmerged
      as of this check); no kitty-protocol dispatch found in current src/modes.py or parser sources
    alacritty: 'alacritty_terminal/src/term/mod.rs TermMode::DISAMBIGUATE_ESC_CODES/REPORT_EVENT_TYPES/REPORT_ALTERNATE_KEYS/REPORT_ALL_KEYS_AS_ESC/REPORT_ASSOCIATED_TEXT
      bitflags; PR #7125'
    mintty: 'mintty/wiki/Changelog.md only mentions ''kitty'' re: an unrelated unscroll sequence and SGR
      58/59 underline colour; no keyboard-protocol code found in src/'
    iterm2: https://gitlab.com/gnachman/iterm2/-/issues/10017 'Implement Kitty's keyboard protocol' is
      an OPEN feature request; iTerm2's own CSI-u doc says only 'applications should implement the Kitty
