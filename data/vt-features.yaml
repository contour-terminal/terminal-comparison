- id: sixel
  name: Sixel graphics
  category: graphics
  sequence: DCS Pmacro ; Pback ; Pgrid q ... sixel-data ST
  spec: https://vt100.net/docs/vt3xx-gp/chapter14.html
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: 'yes'
    wezterm: 'yes'
    gnome-terminal: partial
    konsole: 'yes'
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: 'yes'
    xterm: 'yes'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/SixelParser.h/.cpp, Color.h DEC-HLS conversion, Image.h
    kitty: no sixel decoder anywhere under kitty/kitty/*.c; kitty deliberately implements its own graphics
      protocol instead of Sixel
    ghostty: no sixel.zig or decoder in src/terminal/; device_attributes.zig lists a `sixel` DA enum value
      but nothing consumes it to report support, and the terminal has no Sixel parser
    foot: dcs.c includes sixel.h and dispatches to sixel_init()/sixel_unhook(), gated by term->conf->tweak.sixel;
      README advertises Sixel image support
    wezterm: term/src/terminalstate/sixel.rs
    gnome-terminal: 'VTE gitlab.gnome.org/GNOME/vte issue #253 tracks Sixel; implemented behind the `-Dsixel=true`
      Meson build flag, exposed in GNOME Terminal as Preferences > Compatibility > Enable Sixel Images;
      many distro packages ship it built without the flag or disabled by default'
    konsole: src/Vt102Emulation.cpp processSixel()/m_SixelPictureDefinition, src/Screen.h TerminalGraphicsPlacement_t::Sixel
    windows-terminal: src/terminal/adapter/SixelParser.hpp/.cpp, wired into AdaptDispatch (adaptDispatch.cpp
      _sixelParser)
    mintty: src/sixel.c, src/sixel_hls.c
    iterm2: sources/VT100/VT100Terminal.m includes sixel.h, has a sixelDisplayMode property, a DCS_SIXEL
      token case (~line 3102) that forwards to terminalAppendSixelData:, and executeSetRequestSixelGeometry:;
      supported since v3.3 per vendor release notes
    xterm: graphics_sixel.c/.h in xterm-406, the origin of the sequence
    alacritty: 'github.com/alacritty/alacritty issue #910 (open, unimplemented) and PR #4763 (graphics
      support, declined/unmerged by maintainers); no sixel code in mainline alacritty'
  notes: GNOME Terminal/VTE support is real but opt-in at build time, so most distro binaries ship without
    it. Kitty and Ghostty deliberately do not implement Sixel, favoring their own graphics protocols;
    Alacritty's maintainers have repeatedly declined graphics support.
- id: iterm2_inline_images
  name: iTerm2 inline images (OSC 1337 File=)
  category: graphics
  sequence: 'OSC 1337 ; File = [args] : base64-data ST'
  spec: https://iterm2.com/documentation-images.html
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: unknown
    wezterm: 'yes'
    gnome-terminal: 'no'
    konsole: 'yes'
    windows-terminal: 'no'
    mintty: unknown
    iterm2: 'yes'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/Functions.h ITERM2 = OSC(1337, ...); src/vtbackend/Screen.cpp processITerm2()/renderITerm2InlineImage()
      actually decodes and displays the image (not just a capability stub)
    kitty: kitty/kitty/vt-parser.c case 1337 and kitty/window.py osc_1337() only implement `SetUserVar`;
      File/FileEnd/FilePart/MultipartFile are not handled at all — kitty pushes its own graphics protocol
      instead
    ghostty: src/terminal/osc/parsers/iterm2.zig explicitly routes .File/.FileEnd/.FilePart/.MultipartFile
      to the 'unimplemented OSC 1337' branch (log.debug + parser.command = .invalid); only CurrentDir
      (OSC7-equivalent) and a few other keys are implemented
    wezterm: term/src/terminalstate/iterm.rs
    gnome-terminal: no OSC 1337/iTerm2 image handling found in VTE; not in any supported-terminal comparison
      for this protocol
    konsole: src/Vt102Emulation.h Image = 1337 token, src/Vt102Emulation.cpp special-cases "1337;File=:"
      / "1337;FilePart=" and calls addPlacement(..., TerminalGraphicsPlacement_t::iTerm, ...)
    windows-terminal: src/terminal/adapter/adaptDispatch.cpp AdaptDispatch::DoITerm2Action only implements
      the `SetMark` action (shell-integration marks) behind Feature_ScrollbarMarks; any other action (including
      File=) falls through to _api.UnknownSequence()
    iterm2: native/originating implementation
    xterm: no OSC 1337 handling found anywhere in xterm-406 sources
    alacritty: no OSC 1337 image handling in mainline; only available via the unmerged ayosec/alacritty
      graphics fork
  notes: Ghostty explicitly logs OSC 1337 File= as unimplemented in its iterm2.zig OSC parser as of this
    checkout — it is not a rendering gap, the code path is a stub. Windows Terminal's OSC 1337 support
    is unrelated to images (shell-integration marks only).
- id: kitty_graphics_protocol
  name: Kitty graphics protocol
  category: graphics
  sequence: APC G <key>=<value>,... ; <payload> ST
  spec: https://sw.kovidgoyal.net/kitty/graphics-protocol/
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'no'
    wezterm: 'yes'
    gnome-terminal: 'no'
    konsole: 'yes'
    windows-terminal: 'no'
    mintty: unknown
    iterm2: 'no'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/Screen.h replyKittyGraphics()/renderKittyImage()/deleteKittyGraphics(), kitty_graphics::Command;
      src/vtbackend/KittyGraphics_test.cpp
    kitty: kitty/kitty/graphics.c, graphics.h, parse-graphics-command.h, graphics_vertex.glsl/graphics_fragment.glsl
      — the protocol's origin
    ghostty: src/terminal/kitty/graphics.zig, graphics_command.zig, graphics_exec.zig, graphics_image.zig,
      graphics_render.zig, graphics_storage.zig, graphics_unicode.zig, plus a public C API in include/ghostty/vt/kitty_graphics.h
    foot: no kitty-graphics code found anywhere in the tree (0 matches for 'kitty' in vt.c); foot deliberately
      implements only Sixel, not the kitty graphics protocol
    wezterm: term/src/terminalstate/kitty.rs, wezterm-escape-parser/src/apc.rs
    gnome-terminal: 'not in any current supported-terminal list for the protocol; no matching code in
      VTE gitlab tracker beyond unrelated kitty-keyboard-protocol issue #2601'
    konsole: src/Vt102Emulation.cpp comment '... konsole does process some APCs (kitty images)' at apc_put(),
      src/Screen.h TerminalGraphicsPlacement_t::Kitty
    windows-terminal: no kitty-graphics code found in src/terminal/adapter or src/terminal/parser
    iterm2: absent from current (2024-2025) supported-terminal comparisons for the protocol; open unresolved
      feature request gitlab.com/gnachman/iterm2/-/issues/7825
    xterm: no kitty-graphics code in xterm-406
    alacritty: not in supported-terminal list (kitty, wezterm, wayst, konsole); no code in mainline alacritty
  notes: Foot's non-support is a deliberate upstream design decision (Sixel only), not an oversight —
    see codeberg.org/dnkl/foot/issues/481.
