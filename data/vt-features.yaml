- id: mode_2027_grapheme_clustering
  name: DEC mode 2027 (grapheme clustering)
  category: unicode
  sequence: CSI ? 2027 h / l
  spec: https://github.com/contour-terminal/terminal-unicode-core
  support:
    contour: 'yes'
    kitty: partial
    ghostty: 'yes'
    foot: 'yes'
    wezterm: 'yes'
    gnome-terminal: 'no'
    konsole: 'no'
    windows-terminal: partial
    mintty: partial
    iterm2: 'no'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/primitives.h (DECMode::Unicode -> 2027), Screen.cpp late-codepoint width-revision
      logic, Settings.h graphemeClustering default
    kitty: 'kitty/modes.h has no 2027 entry, and vt-parser.c/screen.c never reference it -- kitty does
      NOT implement the CSI ?2027h/l negotiation. It performs full Unicode-16 grapheme segmentation unconditionally
      instead (docs/changelog.rst 0.42.0: ''Behavior change: Now kitty does full grapheme segmentation
      following the Unicode 16 spec... :iss:8533'')'
    ghostty: src/terminal/modes.zig:297 grapheme_cluster=2027; src/terminal/Terminal.zig has real cluster-width-revision
      logic and dedicated tests (e.g. 'VS16 to make wide character with mode 2027')
    foot: 'foot/csi.c: case 2027 appears in the set (line 562), query (663), save (711) and restore (756)
      mode handlers'
    wezterm: wezterm-escape-parser/src/csi.rs:949 GraphemeClustering = 2027
    gnome-terminal: GNOME/vte src/modes.py:1054 declares mode_WHAT('CONTOUR_UNICODE_CORE', 2027, ...)
      for DECRQM bookkeeping, but a GitHub code search over the whole repo finds zero other references
      to that symbol -- no behavioral hookup exists
    konsole: no reference to 2027 anywhere in konsole/src (checked Vt102Emulation.cpp and the whole tree)
    windows-terminal: src/terminal/adapter/DispatchTypes.hpp:548 GCM_GraphemeClusterMode=DECPrivateMode(2027);
      adaptDispatch.cpp:1891,2032-2033 implements it, but adapterTest.cpp's RequestPermanentModeTests
      proves ResetMode is a no-op and DECRQM always answers ';3$y' (permanently set) -- grapheme clustering
      cannot be turned off
    mintty: 'src/termout.c:2741 ''when 2027 or 7769: /* Emoji 2-cell width mode */ term.emoji_width =
      state;'' -- mintty reuses the number 2027 for a narrower, different feature (toggling emoji to 2
      cells wide), not the terminal-unicode-core late-codepoint-revision semantics'
    iterm2: no case for 2027 in sources/VT100/VT100Terminal.m (grepped the full mode-switch); GitHub code
      search over the repo for the mode found nothing relevant
    xterm: no match for 2027 (or 'grapheme') anywhere in xterm-406 source or ctlseqs.txt
    alacritty: alacritty/vte src/ansi.rs NamedPrivateMode enum (its central mode registry) tops out at
      SyncUpdate=2026; no Grapheme variant exists
  notes: 'kitty, Windows Terminal and mintty each reuse the wire compatibility surface without implementing
    the real negotiable-mode semantics: kitty is always-on with no mode at all, WT is always-on but answers
    DECRQM correctly as permanent, and mintty repurposes the number for plain emoji-width toggling. Independently
    corroborated by measurement: kitty does full grapheme segmentation unconditionally (its ZWJ handling
    scores 100%), but a live DECRQM probe against kitty reports mode 2027 as unsupported -- confirming
    there is no negotiation, only always-on behavior.'
- id: mode_2026_synchronized_output
  name: DEC mode 2026 (synchronized/batched output)
  category: unicode
  sequence: CSI ? 2026 h / l
  spec: https://gist.github.com/christianparpart/d8a62cc1ab659194337d73e399004036
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'yes'
    wezterm: 'yes'
    gnome-terminal: 'no'
    konsole: 'yes'
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: 'yes'
    xterm: 'no'
    alacritty: 'yes'
    apple-terminal: unknown
  evidence:
    contour: src/vtbackend/primitives.h:830-835 DECMode::BatchedRendering=36 mapped to mode 2026 at :1354;
      Terminal.h:120 checks it
    kitty: 'kitty/modes.h:86 #define PENDING_UPDATE (2026 << 5)'
    ghostty: src/terminal/modes.zig:296 synchronized_output=2026; src/terminal/Parser.zig has a matching
      parser test
    foot: 'foot/csi.c: case 2026 in set (555), query (662), save (710) and restore (755) mode handlers'
    wezterm: wezterm-escape-parser/src/csi.rs:955 SynchronizedOutput = 2026, with a round-trip parser
      test at parser/mod.rs:1003-1004
    gnome-terminal: GNOME/vte src/modes.py:1050 declares mode_WHAT('CONTOUR_BATCHED_RENDERING', 2026,
      ...) for DECRQM bookkeeping only; a GitHub code search finds zero other references -- no batching
      behavior is implemented
    konsole: 'src/Vt102Emulation.cpp:2354-2355 -- case token_csi_pr(''h'',2026): setMode(MODE_SynchronizedUpdate);
      (mislabeled ''//ITERM2'' in a comment, but functionally correct)'
    windows-terminal: src/terminal/adapter/DispatchTypes.hpp:547 SO_SynchronizedOutput=DECPrivateMode(2026);
      src/renderer/base/renderer.cpp:514-522 has real throttled-render logic keyed off it
    mintty: 'src/termout.c:2733-2738 ''when 2026: term.suspend_update = state ? 150 : 0;'' -- a bounded
      (150ms-capped) suspend of screen updates, plus a do_update()+flush on reset'
    iterm2: sources/VT100/VT100Terminal.m:988-990 sets self.synchronizedUpdates on CSI ?2026h/l, and :5620-5621
      answers DECRQM correctly
    xterm: no match for 2026 anywhere in xterm-406 source or ctlseqs.txt -- xterm has not adopted this
      mode
    alacritty: alacritty/vte src/ansi.rs:967 NamedPrivateMode::SyncUpdate=2026, commented '/* The mode
      is handled automatically by [Processor] */'; alacritty_terminal/src/event_loop.rs implements the
      actual batching with a timeout-bounded PTY read (so a misbehaving app can't freeze the display forever)
  notes: Widely adopted; xterm and VTE/GNOME Terminal are the two holdouts among the twelve. VTE has the
    mode number catalogued for correct DECRQM bookkeeping but never wires it to rendering.
- id: kitty_text_sizing_osc66
  name: Kitty text-sizing protocol (OSC 66)
  category: unicode
  sequence: OSC 66 ; key=value:... ; text ST
  spec: https://sw.kovidgoyal.net/kitty/text-sizing-protocol/
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: partial
