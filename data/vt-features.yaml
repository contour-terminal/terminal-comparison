  sequence: CSI Ps ; Ps ' z (DECELR) / CSI Ps ' { (DECSLE) / CSI Ps ' | (DECRQLP)
  spec: https://vt100.net/docs/vt510-rm/DECELR.html
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: 'no'
    wezterm: 'no'
    gnome-terminal: 'no'
    konsole: 'no'
    windows-terminal: 'no'
    mintty: 'yes'
    iterm2: 'no'
    xterm: partial
    alacritty: 'no'
    apple-terminal: unknown
  evidence:
    contour: 'measured by harness/vt_probe.py on this machine: DECRQLP answered with a DECLRP position
      report'
    kitty: no DECELR/DECSLE/DECRQLP in the source tree; measured by harness/vt_probe.py on this machine
    ghostty: no DECELR/DECSLE/DECRQLP in the source tree; measured by harness/vt_probe.py on this machine
    foot: no DECELR/DECSLE/DECRQLP in the source tree; measured by harness/vt_probe.py on this machine
    wezterm: no DECELR/DECSLE/DECRQLP in the source tree; measured by harness/vt_probe.py on this machine
    konsole: no DECELR/DECSLE/DECRQLP in the source tree; measured by harness/vt_probe.py on this machine
    alacritty: measured by harness/vt_probe.py on this machine
    gnome-terminal: 'vteseq.cc recognises DECELR/DECRQLP/DECSLE with empty bodies marked ''TODO: implement'',
      and answers DSR 53/55/56 with an explicit ''no locator'''
    windows-terminal: no VTID for 'z, '{ or '| among the 133 entries in parser/OutputStateMachineEngine.hpp
      -- no parser mapping, so no dispatch and no DECLRP reply; adaptDispatch.cpp:1407-1411 answers the
      DSR locator-status queries with a hardcoded "?53" (locator not connected)
    mintty: termout.c:3682/3705/3715 implement DECELR, DECSLE and DECRQLP, with DECRQLP calling win_get_locator_info()
      for a real Win32 mouse position -- unconditional, no build flag
    xterm: 'charproc.c CASE_DECELR / CASE_DECRQLP are real handlers, but they sit behind #if OPT_DEC_LOCATOR,
      which xtermcfg.h leaves `#undef` -- the locator needs --enable-dec-locator at configure time, so
      a stock build has no locator at all'
    iterm2: VT100Terminal.m:1300 answers DECDSR 50 with the comment 'Locator unavailable becuase DEC locator
      support unimplemented.', and :1308 answers DECDSR 57 'No locator support' -- iTerm2 states it outright
      in its own source
  notes: mintty implements the locator unconditionally. xterm implements it in source but behind a configure
    option that is off by default, so a stock xterm answers nothing; that is why its measured and documented
    rows differ. Windows Terminal lists all three sequences in its documentation catalogue while affirmatively
    reporting no locator device.
