- id: subpixel_antialiasing
  name: Subpixel (LCD) antialiasing
  category: rendering
  support:
    contour: 'yes'
    kitty: 'no'
    ghostty: 'no'
    foot: 'yes'
    wezterm: 'yes'
    gnome-terminal: partial
    konsole: partial
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: partial
    xterm: 'yes'
    alacritty: 'no'
    apple-terminal: 'no'
  evidence:
    contour: src/text_shaper/open_shaper.cpp uses FT_LOAD_TARGET_LCD / FT_RENDER_MODE_LCD, FT_Library_SetLcdFilter
    kitty: kitty/freetype.c:1299,1334,1397 use FT_RENDER_MODE_NORMAL only (grayscale AA); no LCD render
      path
    ghostty: src/font/face/freetype.zig and src/font/face/coretext.zig rasterize to a .grayscale Atlas
      only; no LCD/subpixel atlas format
    foot: doc/foot.ini.5.scd:1866 references subpixel rendering; font rendering delegated to fcft/FreeType+fontconfig
      which honors fontconfig's rgba/subpixel hinting config
    wezterm: https://wezterm.org/config/lua/config/freetype_render_target.html - HorizontalLcd render
      target
    gnome-terminal: Available via fontconfig/FreeType LCD-filter config under X11; typically forced to
      grayscale AA under Wayland compositors (general Linux font-stack behavior, not a gnome-terminal-specific
      toggle)
    konsole: Only a global QFont::PreferAntialias/NoAntialias toggle (TerminalFonts.cpp:57); no explicit
      LCD/subpixel control, and blur/WA_TranslucentBackground usage would disable subpixel AA when active
    mintty: 'docs/mintty.1:1953-1955 — ''Full: Subpixel anti-aliasing (ClearType)'''
    iterm2: 'iTerm2 implemented its own subpixel AA inside the Metal renderer to work around Apple removing
      system-wide LCD font smoothing since macOS Mojave/11; GitLab issue #9035 documents rendering bugs
      with subpixel AA + GPU renderer on Apple Silicon, and #7156 documents it being disabled under some
      macOS versions'
    xterm: xterm.man renderFont/faceName hand rendering to the Xft library, which supports LCD/subpixel
      antialiasing via fontconfig configuration
    alacritty: 'Issue #4059 ''Subpixel antialiasing is not available Linux''; issues #2/#3756 describe
      subpixel mask handling as broken/unsupported — effectively greyscale AA only'
    windows-terminal: AntialiasingMode::ClearType is a real DirectWrite ClearType (RGB subpixel) rendering
      mode — src/renderer/atlas/AtlasEngine.api.cpp:518, dwrite_helpers.cpp
    apple-terminal: Apple removed subpixel/LCD font smoothing system-wide starting with Mojave (10.14,
      2018); every Cocoa app, Terminal.app included, has been grayscale-AA-only since
