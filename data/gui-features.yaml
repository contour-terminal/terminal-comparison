    xterm: No accessibility caret-reporting mechanism found; consistent with absence of any a11y support
    alacritty: Follows from the absence of any accessibility API layer; no evidence of caret reporting
      found
    windows-terminal: 'UIA events dispatched on cursor-position change since 2020 (PR #4826) — doc/terminal-a11y-2023.md'
    apple-terminal: Apple's accessibility guide covers moving the VoiceOver cursor but does not document
      caret/cursor-position reporting specifically; no confirmation either way
  notes: 'Follows the same pattern as screen-reader support: present only where a full a11y stack exists
    (contour, konsole, gnome-terminal/VTE); ghostty''s caret reporting is macOS-only and on-demand rather
    than a proactive AX notification.'
