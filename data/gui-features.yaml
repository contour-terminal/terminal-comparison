- id: platform_linux_x11
  name: Linux/X11
  category: platform
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'no'
    wezterm: 'yes'
    gnome-terminal: 'yes'
    konsole: 'yes'
    windows-terminal: 'no'
    mintty: 'no'
    iterm2: 'no'
    xterm: 'yes'
    alacritty: 'yes'
    apple-terminal: 'no'
  evidence:
    contour: src/contour/CMakeLists.txt:262 find_package(X11 REQUIRED) on Linux
    kitty: glfw/x11_window.c; docs/faq.rst:335 (X11 icon support)
    ghostty: src/apprt/gtk/winproto/x11.zig
    foot: 'README.md: ''Wayland native, DE agnostic''; no X11 backend, no XWayland fallback mentioned'
    wezterm: https://wezterm.org/config/lua/config/enable_wayland.html (falls back to X11 when enable_wayland=false)
    gnome-terminal: Primary target platform; GTK/GDK X11 backend, GNOME desktop default terminal on X11
      sessions
    konsole: Primary target; standard Qt xcb platform plugin, no special-casing needed
    mintty: README.md — mintty is the Cygwin/MSYS2 terminal, a native Win32 GUI app; no X11 build exists
    iterm2: iTerm2 is macOS-only (iterm2.com documentation and FAQ)
    xterm: xterm is the reference X11 terminal emulator (Xt/Xaw toolkit); xterm.man throughout
    alacritty: https://alacritty.org/ and GitHub README — 'supported platforms currently consist of BSD,
      Linux, macOS and Windows'; X11 is the default Linux backend
    windows-terminal: Windows-only WinUI3/Win32 app model; src/cascadia is XAML/WinRT, no X11 backend
      anywhere in the tree
    apple-terminal: macOS-only, ships as part of the OS (support.apple.com/guide/terminal)
