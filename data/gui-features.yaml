- id: ligature_aware_cursor
  name: Ligature-aware cursor rendering
  category: other
  support:
    contour: unknown
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'no'
    wezterm: partial
    gnome-terminal: 'no'
    konsole: 'yes'
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: 'yes'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: 'no'
  evidence:
    contour: No direct evidence found of ligature-aware cursor placement logic; not documented
    kitty: kitty/options/definition.py:109-121 disable_ligatures 'cursor' mode - suppresses ligature under
      the cursor for editing
    ghostty: src/font/shaper/harfbuzz.zig:194-215,420 and coretext.zig:442-470 - explicit handling to
      keep cursor/glyph placement correct across ligature clusters
    foot: N/A - ligatures are not rendered at all (CHANGELOG.md:2599), so no ligature-aware cursor logic
      exists
    wezterm: 'Cursor renders over full ligature glyph but with known artifacts - wezterm issues #478,
      #2888, #4874'
    gnome-terminal: Given ligature rendering itself is broken/'a mess' in VTE's per-cell grid (see font_ligatures),
      no ligature-aware cursor-positioning logic is documented or evident
    konsole: TerminalPainter::drawContents draws the cursor background rect first (TerminalPainter.cpp:405-430)
      then continues the word-mode ligature run across the cursor cell (lines 432-471), so ligature glyphs
      are not split at the cursor
    mintty: docs/mintty.1:1980-1986 — LigaturesSupport=2 redisplays the previous cursor line after cursor
      movement to keep ligature shaping correct
    iterm2: iTerm2 inserts a dummy empty glyph so the cursor 'functions as though there were two glyphs
      instead of one' when a ligature (e.g. '==') replaces two characters, keeping cursor placement correct
      within ligated clusters
    xterm: N/A - xterm has no ligature rendering at all, so no ligature-aware cursor handling exists
    alacritty: Follows directly from the absence of ligature support entirely
    windows-terminal: _ligatureOverhangTriggerLeft/Right thresholds + _drawTextOverlapSplit handle cursor/selection
      drawing across wide ligature glyph runs — src/renderer/atlas/BackendD3D.cpp:322-345
    apple-terminal: Not applicable/not supported — ligature shaping itself is essentially absent (calt-only,
      see font_ligatures)
