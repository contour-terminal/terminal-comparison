- id: gpu_acceleration
  name: GPU-accelerated rendering
  category: rendering
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'no'
    wezterm: 'yes'
    gnome-terminal: partial
    konsole: 'no'
    windows-terminal: 'yes'
    mintty: 'no'
    iterm2: 'yes'
    xterm: 'no'
    alacritty: 'yes'
    apple-terminal: 'no'
  evidence:
    contour: 'docs/features.md: ''GPU-accelerated rendering''; src/contour/display/RhiRenderer.cpp'
    kitty: docs/overview.rst:16 'using only OpenGL for rendering everything'
    ghostty: src/renderer/backend.zig - Backend enum {opengl, metal, webgl}
    foot: meson.build:148 pixman = dependency('pixman-1'); grid.c uses pixman_image_* for compositing
      (CPU/software rendering, no OpenGL/Vulkan dependency anywhere in meson.build)
    wezterm: config/src/frontend.rs:5 FrontEndSelection{OpenGL,WebGpu,Software}
    gnome-terminal: 'gnome-terminal 3.56 (Mar 2025) moved to GTK4 (>=4.12) + vte-2.91-gtk4, giving GPU-composited
      windows via GTK4''s GSK scene graph, but VTE still rasterizes glyphs via Cairo/Pango internally
      (Phoronix: ''GNOME Terminal Working To Migrate To GTK 4, VTE To Overcome 40 FPS Cap'')'
    konsole: 'TerminalDisplay : public QWidget with paintEvent(QPaintEvent*) (TerminalDisplay.h:558);
      zero QOpenGL hits anywhere in src/'
    mintty: src/wintext.c uses GDI (TextOutW/ExtTextOut) + Uniscribe (usp10.h); DirectWrite appears only
      for non-BMP glyph-existence checks (wintext.c:4902,5005), not compositing
    iterm2: Metal-based GPU renderer since v3.2 (GitLab wiki 'Metal Renderer'; Prefs > General > GPU Rendering)
    xterm: Renders via Xlib/Xft (CPU-side); xterm.man faceName/renderFont resources describe Xft TrueType
      rendering, no GPU path exists
    alacritty: https://alacritty.org/ — 'a cross-platform, OpenGL terminal emulator'
    windows-terminal: AtlasEngine (default renderer since 1.18) draws via Direct3D 11 — src/renderer/atlas/BackendD3D.{h,cpp}
    apple-terminal: Renders via CoreText/CoreGraphics CPU rasterization; no Metal (or other GPU) renderer
      is documented or shipped, unlike iTerm2/Ghostty/Alacritty/Kitty which added one
- id: gpu_api
  name: GPU rendering API
  category: rendering
  values:
    contour: Qt RHI (OpenGL, Vulkan, Metal, or Direct3D 11, selected by Qt's backend at runtime)
    kitty: OpenGL 3.1+ (Linux, w/ extensions) / OpenGL 3.3 core (macOS)
    ghostty: Metal (macOS), OpenGL 4.3+ (Linux/BSD), WebGL (wasm)
    foot: none (software rendering via pixman + Wayland shm buffers)
    wezterm: OpenGL (default); optional WebGpu via wgpu (Vulkan/Metal/DX12); Software fallback
    gnome-terminal: GTK4 GSK scene graph (OpenGL 'NGL' renderer; Vulkan by default on Wayland since GTK
      4.16)
    konsole: none - CPU/software rasterization via QWidget+QPainter (Qt raster paint engine)
    windows-terminal: Direct3D 11 (AtlasEngine)
    mintty: None — GDI raster (CPU); DirectWrite only for glyph-existence probing
    iterm2: Metal
    xterm: none (Xlib/Xft, CPU-rendered)
    alacritty: OpenGL 3.3 core (GLES 2.0 fallback)
    apple-terminal: none (CoreGraphics/CoreText, CPU)
  evidence:
    contour: src/contour/display/TerminalRenderNode.cpp, RhiRenderer.cpp use QRhi abstraction
    kitty: kitty/data-types.h:24-30; docs/changelog.rst:1843 (min lowered 3.3->3.1+ext on Linux); no Metal/Vulkan
      path in source
    ghostty: src/renderer/backend.zig:14-19; src/renderer/OpenGL.zig:37-38 (MIN_VERSION 4.3)
    foot: meson.build:148,286,297,313,347-348 link pixman, no GL/Vulkan dep
    wezterm: config/src/frontend.rs:5-9; https://wezterm.org/config/lua/config/front_end.html
    gnome-terminal: GTK4 GSK renderer docs; gnome-terminal meson.build requires gtk4>=4.12 / vte-2.91-gtk4>=0.72.2
    konsole: no QOpenGL/QRhi usage found anywhere in src/
    mintty: src/wintext.c:4902,5005
    iterm2: iTerm2 3.2 'new drawing engine that uses Metal' (news.ycombinator.com/item?id=17634547; GitLab
      wiki Metal-Renderer)
    xterm: xterm.man renderFont/faceName resources; no GPU/Vulkan/OpenGL/Metal reference anywhere in source
      or docs
    alacritty: README minimum requirement; GLES2 fallback renderer discussion in issue tracker
    windows-terminal: src/renderer/atlas/BackendD3D.h/.cpp — D3D11 device/swapchain creation and draw
      calls
    apple-terminal: No GPU compositing path documented anywhere for Terminal.app's text rendering
- id: font_ligatures
  name: Font ligatures
  category: rendering
  support:
    contour: 'yes'
    kitty: 'yes'
    ghostty: 'yes'
    foot: 'no'
    wezterm: 'yes'
    gnome-terminal: partial
    konsole: 'yes'
    windows-terminal: 'yes'
    mintty: 'yes'
    iterm2: 'yes'
    xterm: 'no'
    alacritty: 'no'
    apple-terminal: partial
  evidence:
    contour: 'docs/features.md: ''Font ligatures support (such as in Fira Code)''; src/text_shaper/cluster_spans.h'
    kitty: kitty/options/definition.py:109 disable_ligatures option (calt OpenType feature)
    ghostty: src/font/shaper/harfbuzz.zig (HarfBuzz ligature-cluster handling); src/font/shaper/coretext.zig
    foot: CHANGELOG.md:2599 'foot only shapes individual graphemes, not entire text runs. That means e.g.
      ligatures are not supported.'
    wezterm: config/src/config.rs harfbuzz_features; https://wezterm.org/config/lua/config/harfbuzz_features.html
    gnome-terminal: Underlying Pango/HarfBuzz supports OpenType ligatures, but VTE's per-cell grid model
      renders them incorrectly ('GNOME Terminal makes a mess of ligatures' - arongriffis.com/2020-02-09-gnome-terminal-ligatures)
    konsole: Profile::WordModeCoding groups ligature-forming glyphs into one drawText() call; EditProfileAppearancePage.ui
      'Coding ligatures characters'
    mintty: docs/mintty.1:1972-1996 — Ligatures= / LigaturesSupport= options, rendered via Uniscribe
    iterm2: Prefs > Profiles > Text > 'Use ligatures', rendered via CoreText (iterm2.com/documentation-fonts.html;
      documentation-preferences-profiles-text.html)
    xterm: No font-shaping/ligature engine; xterm draws one glyph per cell via Xft, no HarfBuzz/ligature
      support mentioned in xterm.man
    alacritty: 'GitHub issue #50 still open; custom rasterizer with no HarfBuzz shaping pass; PR #2677
      (HarfBuzz ligatures) never merged — confirmed still unsupported in 2025 sources'
    windows-terminal: DWRITE_FONT_FEATURE_TAG_STANDARD_LIGATURES + _CONTEXTUAL_LIGATURES enabled — src/renderer/atlas/AtlasEngine.api.cpp:543-544,
      with a per-glyph-run ligature-overhang heuristic for cursor/selection drawing (BackendD3D.cpp:322-345)
    apple-terminal: 'Only the ''calt'' (contextual alternates) OpenType feature is shaped; ''liga''/''dlig''
      — what most programming-ligature fonts (Fira Code, etc.) rely on — do not render, and there is no
      user setting to change this. Not Apple-documented; widely reported (github.com/be5invis/Iosevka
      issue #294; multiple font-vendor support threads)'
