# Which measured fields from a ucs-detect YAML are surfaced in the report, and how.
#
# Everything here is *measured* -- the value comes from a probe the terminal answered
# during the run, not from documentation.  That makes it reproducible, but it also
# means a "no" can mean "not supported", "not enabled in the default configuration",
# or "the probe asked the wrong question".  Where that distinction is known to matter,
# a `caveat` is attached and rendered next to the row.

# --- capability probes, read from terminal_results ---------------------------------
probes:
  - id: sixel
    field: sixel
    name: Sixel graphics
    category: graphics
    caveat: >-
      xterm gates Sixel on its *graphics* ID rather than its terminal ID, and ships with
      it off. The harness now starts xterm with `decGraphicsID: vt340`, which enables
      Sixel without dropping the terminal below VT420 and losing the rectangular
      operations, so xterm's row reflects what it can do rather than what it does out of
      the box.

  - id: kitty_graphics
    field: kitty_graphics
    name: Kitty graphics protocol
    category: graphics

  - id: kitty_keyboard
    field: kitty_keyboard
    name: Kitty keyboard protocol
    category: input
    truthy_when_dict: true

  - id: kitty_clipboard
    field: kitty_clipboard_protocol
    name: Kitty clipboard (OSC 5522)
    category: clipboard

  - id: kitty_notifications
    field: kitty_notifications
    name: Kitty notifications
    category: other
    truthy_when_dict: true

  - id: kitty_pointer_shapes
    field: kitty_pointer_shapes
    name: Kitty pointer shapes (OSC 22)
    category: other
    truthy_when_dict: true

  - id: osc52_clipboard
    field: osc52_clipboard
    name: OSC 52 clipboard
    category: clipboard
    caveat: >-
      Detected by what the terminal advertises -- DA1 extension 52 and the XTGETTCAP `Ms`
      capability -- not by writing to the clipboard, which would raise a permission
      prompt. A terminal that implements OSC 52 without advertising it, or that ships it
      disabled for security reasons, therefore reads as "no".

  - id: styled_underlines
    field: styled_underlines
    name: Styled underlines (CSI 4:x)
    category: colors
    caveat: >-
      Asked through XTGETTCAP, so this measures whether the terminal *advertises* the
      capability, not whether it draws a curly underline. Several terminals that render
      them -- VTE, Konsole and Alacritty among the ones measured here -- do not answer the
      capability query, and the documented matrix records them as supporting the feature.
      Read a "no" as "not advertised".

  - id: colored_underlines
    field: colored_underlines
    name: Underline colour (SGR 58)
    category: colors
    caveat: >-
      Asked through XTGETTCAP, with the same caveat as styled underlines: this is what the
      terminal advertises, not what it renders.

  - id: decrqss
    field: decrqss
    name: DECRQSS (request selection or setting)
    category: query

  - id: decrqcra
    field: decrqcra
    name: DECRQCRA (checksum of rectangular area)
    category: query
    caveat: >-
      xterm gates this on two things at once (charproc.c:5612): a VT420 terminal level,
      which is already its default, and `AllowWindowOps(ewGetChecksum)`, which is not.
      The harness now starts xterm with `allowWindowOps: true` and xterm answers. Note
      also that the reply's final byte is contested -- xterm answers `* y`, not `$ y` --
      so a probe written against the other reading can still record a false negative.

# --- extra VT probes, read from <terminal>.vtprobe.json ----------------------------
# These are features DECRQM cannot answer, because they are not modes.  The probe uses
# the sequence and reads what comes back; `path` addresses the probe's JSON output.
vt_probes:
  - id: decxcpr
    path: pages.decxcpr
    name: DECXCPR (extended cursor position report)
    category: pages

  - id: reports_page
    path: pages.reports_page
    name: Reports a page number
    category: pages
    caveat: >-
      A terminal can answer DECXCPR without the third (page) parameter. That is recorded
      here as "no": it answers the report but has no page memory to describe.

  - id: multiple_pages
    path: pages.multiple_pages
    name: DEC page memory (more than one page)
    category: pages
    caveat: >-
      Confirmed by moving with PPA and asking DECXCPR which page the cursor is on, so a
      terminal that accepts PPA and ignores it is not counted.

  - id: pages_reachable
    path: pages.pages_reachable
    name: Pages reached
    category: pages
    numeric: true
    caveat: >-
      The walk stops at 32, well above any implementation found, and the probe records
      whether it hit that ceiling. Contour reaches 15, which matches its source exactly:
      MaxPageCount is 16 and the last index is reserved for the alternate screen, leaving
      15 DEC-addressable pages. An earlier ceiling of 8 understated it, and the number
      here was the probe's limit rather than the terminal's.

  - id: np_pp
    path: page_sequences.np_pp
    name: NP / PP (next and preceding page)
    category: pages

  - id: decrqlp
    path: locator.decrqlp
    name: DEC locator (DECELR / DECRQLP)
    category: locator
    caveat: >-
      A terminal with no locator answers nothing at all. xterm's case is a build option,
      not a runtime one: OPT_DEC_LOCATOR is `#undef` by default in xtermcfg.h and needs
      `--enable-dec-locator` at configure time, so a stock xterm has no locator code
      compiled in and its "no" is correct for the binary measured here, while the
      documented row records that the implementation exists in the source.

  - id: locator_available
    path: locator.locator_available
    name: Locator reports a position
    category: locator
    caveat: >-
      DECLRP with Pe=0 means "locator unavailable" -- the sequence is implemented but no
      pointing device answered. Under a headless display that is the expected reply, so
      this row separates "implements the locator" from "a device was there".

  - id: rtl_honoured
    path: rtl.rtl_honoured
    name: DECRLM actually moves the cursor leftwards
    category: bidi
    caveat: >-
      Functional, not declarative. The probe writes one Hebrew letter from column 40 with
      DECRLM (mode 34) reset and again with it set, and compares the cursor advance. Only
      a reversal counts: +1 then -1 is honoured, +1 then +1 means the mode is recognised
      and does nothing. Measuring both directions also proves the terminal was answering
      DSR 6 at all, so a "no" here cannot be a silent timeout.

# --- modes whose DECRQM answer can be checked against actual behaviour --------------
# DECRQM reports what a terminal *recognises*, which is not the same as what it *does*.
# Where a functional probe exists for the same feature, the two are compared and any
# terminal that declares support without acting on it is named. This is the failure mode
# a mode query cannot see by construction.
mode_behaviour_checks:
  - number: 34
    name: DECRLM (right-to-left mode)
    probe_path: rtl.rtl_honoured
    note: >-
      Declaring DECRLM tells an application it may rely on right-to-left layout. A
      terminal that answers DECRQM affirmatively and then advances the cursor rightwards
      is worse than one that answers "not recognised", because the application has no way
      to find out.

# --- DEC private modes, read from terminal_results.modes ---------------------------
# A terminal that answers no DECRQM at all is rendered "n/a" rather than "?": the probe
# asked and got silence, which is a fact about the terminal. Konsole is the case here --
# its CSI_PR dispatch (Vt102Emulation.cpp token_csi_pr) handles the h/l/s/r finals and
# has no `$ p` at all, so it can set and reset modes but never report one.
# `supported` is what DECRQM reported; a mode the terminal does not recognise answers
# "not recognised" and is rendered as "no".
modes:
  - number: 2027
    name: Grapheme clustering
    category: unicode
    note: Governs whether width is measured per grapheme cluster or per codepoint.
  - number: 2026
    name: Synchronized output
    category: other
  - number: 2048
    name: In-band resize notification
    category: window
  - number: 2004
    name: Bracketed paste
    category: input
  - number: 1049
    name: Alternate screen buffer
    category: window
  - number: 7
    name: Auto-wrap (DECAWM)
    category: other

# Mouse reporting, in the order the protocols appeared.  Every one of these is a DEC
# private mode, so DECRQM answers them and no separate probe is needed.
mouse_modes:
  - number: 9
    name: X10 compatibility mouse reporting
  - number: 1000
    name: VT200 mouse — report button press and release
  - number: 1001
    name: Highlight mouse tracking
  - number: 1002
    name: Button-event tracking (motion while pressed)
  - number: 1003
    name: Any-event tracking (motion always)
  - number: 1004
    name: Focus in/out events
  - number: 1005
    name: UTF-8 extended coordinates
  - number: 1006
    name: SGR extended coordinates
  - number: 1007
    name: Alternate-scroll mode
  - number: 1015
    name: urxvt extended coordinates
  - number: 1016
    name: SGR-pixel coordinates
  - number: 2029
    name: Passive mouse tracking (Contour extension)
    note: >-
      Lets an application receive mouse position without taking the mouse away from the
      user's selection. Contour's own extension; no other terminal implements it yet.

# --- cross-checks between the measured and documented tables -----------------------
# The two halves of this report are produced by different methods: one asks the running
# terminal, the other reads its source and documentation.  Where they cover the same
# feature they should agree, and where they do not, the disagreement is itself worth
# printing -- it is usually a feature that exists but ships disabled, which is exactly
# what a reader needs to know.  The report computes these rather than asserting them, so
# the list cannot go stale.
cross_checks:
  - probe_field: sixel
    row: sixel
  - probe_field: kitty_graphics
    row: kitty_graphics_protocol
  - probe_field: kitty_clipboard_protocol
    row: kitty_clipboard_protocol
  - probe_field: osc52_clipboard
    row: osc52_clipboard
  - probe_field: kitty_keyboard
    row: kitty_keyboard_protocol
  - probe_field: colored_underlines
    row: underline_color_sgr58
  - probe_field: styled_underlines
    row: underline_styles_curly

# --- ucs-detect Unicode test categories -------------------------------------------
unicode_categories:
  - key: unicode_wide_results
    name: Wide
    blurb: Characters that must occupy two columns.
  - key: narrow_results
    name: Narrow
    blurb: Characters that must occupy exactly one column.
  - key: emoji_vs16_results
    name: VS16
    blurb: >-
      Emoji presentation selector. VS16 may promote a cluster to two columns, so the
      expectation is a width of 2.
  - key: emoji_vs15_results
    name: VS15
    blurb: >-
      Text presentation selector. VS15 must NOT change the cluster's width, so a wide
      base is still expected to measure 2. See the VS15 section of the report.
  - key: emoji_zwj_results
    name: ZWJ
    blurb: Zero-width-joiner emoji sequences, which must measure as a single cluster.
  - key: ri_results
    name: Flags (RI)
    blurb: Regional-indicator pairs forming flag emoji.
  - key: sri_results
    name: Lone RI
    blurb: A single regional indicator, with no pair to join.
  - key: sfz_results
    name: Skin tone
    blurb: Fitzpatrick skin-tone modifiers applied to a base emoji.
